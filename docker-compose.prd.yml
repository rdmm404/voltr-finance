services:
  api:
    container_name: svc-voltr-finance-api
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    environment:
      VOLTR_API_ADDRESS: ":8080"
      VOLTR_UI_DEFAULT_USER_ID: "${VOLTR_UI_DEFAULT_USER_ID:?set VOLTR_UI_DEFAULT_USER_ID}"
      VOLTR_UI_DEFAULT_HOUSEHOLD_ID: "${VOLTR_UI_DEFAULT_HOUSEHOLD_ID:?set VOLTR_UI_DEFAULT_HOUSEHOLD_ID}"
      TZ: "${TZ:-America/Toronto}"
      DB_HOST: postgres
      DB_PORT: "5432"
      ENVIRONMENT: prd
    env_file:
      - .env
    networks:
      - postgres-network
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.voltr-finance-ui.rule=Host(`finance.homelab.voltr.org`) && !PathPrefix(`/v1`) && !Path(`/live`)"
      - "traefik.http.routers.voltr-finance-ui.entrypoints=websecure"
      - "traefik.http.routers.voltr-finance-ui.tls.certresolver=myresolver"
      - "traefik.http.routers.voltr-finance-ui.middlewares=voltr-finance-ui-auth"
      - "traefik.http.middlewares.voltr-finance-ui-auth.basicauth.users=${VOLTR_UI_BASIC_AUTH_USERS:?set VOLTR_UI_BASIC_AUTH_USERS}"
      - "traefik.http.routers.voltr-finance-api.rule=Host(`finance-api.homelab.voltr.org`) && PathPrefix(`/v1`)"
      - "traefik.http.routers.voltr-finance-api.entrypoints=websecure"
      - "traefik.http.routers.voltr-finance-api.tls.certresolver=myresolver"
      - "traefik.http.services.voltr-finance-api.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/live"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  migrate:
    image: ghcr.io/amacneil/dbmate
    command: ["up"]
    volumes:
      - ./db:/db:rw
    env_file:
      - .env.dbmate
    networks:
      - postgres-network
    profiles:
      - migrate

networks:
  postgres-network:
    external: true
  traefik_proxy:
    external: true
