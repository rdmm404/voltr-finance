services:
  api:
    container_name: svc-voltr-finance-api
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    environment:
      VOLTR_API_ADDRESS: ":8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      ENVIRONMENT: prd
    env_file:
      - .env
    networks:
      - postgres-network
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.voltr-finance-api.rule=Host(`api.finance.homelab.voltr.org`)"
      - "traefik.http.routers.voltr-finance-api.entrypoints=websecure"
      - "traefik.http.routers.voltr-finance-api.tls.certresolver=myresolver"
      - "traefik.http.services.voltr-finance-api.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/live"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  migrate:
    image: ghcr.io/amacneil/dbmate
    command: ["up"]
    volumes:
      - ./db:/db:rw
    env_file:
      - .env.dbmate
    networks:
      - postgres-network
    profiles:
      - migrate

networks:
  postgres-network:
    external: true
  traefik_proxy:
    external: true
