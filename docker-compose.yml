services:
  api:
    container_name: voltr-api
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ./cmd:/app/cmd:rw
      - ./internal:/app/internal:rw
    environment:
      VOLTR_API_ADDRESS: ":8080"
      VOLTR_API_KEY: "${VOLTR_API_KEY:-development-only-key}"
      VOLTR_UI_DEFAULT_USER_ID: "${VOLTR_UI_DEFAULT_USER_ID:-1}"
      VOLTR_UI_DEFAULT_HOUSEHOLD_ID: "${VOLTR_UI_DEFAULT_HOUSEHOLD_ID:-1}"
      TZ: "${TZ:-America/Toronto}"
      DB_USER: voltr
      DB_PASSWORD: voltr
      DB_NAME: voltr_finance
      DB_HOST: db
      DB_PORT: "5432"
      DB_POOL_SIZE: "5"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/live"]
      interval: 10s
      timeout: 3s
      retries: 5

  db:
    image: postgres:17-alpine
    container_name: voltr-db
    environment:
      POSTGRES_USER: voltr
      POSTGRES_PASSWORD: voltr
      POSTGRES_DB: voltr_finance
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voltr -d voltr_finance"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: ghcr.io/amacneil/dbmate
    entrypoint: ["sh"]
    command: ["/db/init.sh"]
    volumes:
      - ./db:/db:rw
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER: voltr
      DB_PASSWORD: voltr
      DB_NAME: voltr_finance
      DB_HOST: db
      DB_PORT: "5432"

volumes:
  db_data:
