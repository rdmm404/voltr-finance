name: CI

on:
  push:
    branches: [main, rewrite-hexagonal-api]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.4"
          cache: true
      - run: go test -count=1 ./...
      - run: go vet ./...
      - run: go build -trimpath ./cmd/api ./cmd/cli
      - run: git diff --check

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.4"
          cache: true
      - run: go test -race -count=1 ./...

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: voltr
          POSTGRES_PASSWORD: voltr
          POSTGRES_DB: voltr_finance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U voltr -d voltr_finance"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.4"
          cache: true
      - name: Migrate test database
        run: >-
          docker run --rm --network host --entrypoint sh
          -v "$GITHUB_WORKSPACE/db:/db"
          -e DB_USER=voltr -e DB_PASSWORD=voltr -e DB_NAME=voltr_finance
          -e DB_HOST=127.0.0.1 -e DB_PORT=5432
          ghcr.io/amacneil/dbmate /db/init.sh
      - name: Run PostgreSQL adapter integration tests
        env:
          VOLTR_INTEGRATION_TEST: "1"
          DATABASE_URL: postgres://voltr:voltr@127.0.0.1:5432/voltr_finance?sslmode=disable&search_path=transactions
        run: go test -count=1 -v ./internal/postgres/...
